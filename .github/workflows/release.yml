name: Release Builder

# This tells GitHub to only run this script when you push a new version tag (e.g., v1.0.0)
on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    permissions:
      contents: write # Required so the bot can upload the .exe/.dmg/.deb to the repo

    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust compiler
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend NPM packages
        run: npm install

      - name: Build Tauri App and Publish Release
        uses: tauri-apps/tauri-action@v0
        env:
          # GitHub automatically generates this temporary password for the bot
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Dutch Touch Release ${{ github.ref_name }}'
          releaseBody: 'Automated build generated by GitHub Actions.'
          releaseDraft: false
          prerelease: false